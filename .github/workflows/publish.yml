name: publish

# Publishes the language packages when a release tag is pushed.
#   git tag v0.1.0 && git push origin v0.1.0
# Each job publishes only if its registry secret is configured (see PUBLISHING.md),
# so you can enable registries one at a time. Go needs no registry — pkg.go.dev
# indexes the module from a `go/vX.Y.Z` tag automatically.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      # The `secrets` context is not allowed in `if:` expressions (the workflow
      # file fails validation and no jobs run), so each job guards in the shell.
      - name: npm publish @qorechain/pqc
        working-directory: js
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then echo "NPM_TOKEN not configured — skipping"; exit 0; fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  crates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo publish qorechain-pqc
        working-directory: rust
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then echo "CARGO_REGISTRY_TOKEN not configured — skipping"; exit 0; fi
          cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install build twine
      - name: build + twine upload qorechain-pqc
        working-directory: python
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then echo "PYPI_TOKEN not configured — skipping"; exit 0; fi
          python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  maven:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: mvn -Prelease deploy to Maven Central
        working-directory: java
        run: |
          if [ -z "$MAVEN_CENTRAL_USERNAME" ]; then echo "MAVEN_CENTRAL_USERNAME not configured — skipping"; exit 0; fi
          mvn -B -Prelease deploy
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
